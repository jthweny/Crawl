<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crawl — your app, built live</title>
<style>
  :root{ --bg:#f6f6f4; --ink:#22242a; --soft:#5c6066; --edge:#e5e5e0; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#2f3136; --ink:#f0f0ee; --soft:#b6b9bf; --edge:#4a4c53; }
  }
  body{ margin:0; background:var(--bg); color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font:16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased; }
  main{ text-align:center; padding:40px 24px; }
  h1{ font-size:44px; font-weight:800; letter-spacing:.5px; margin:0 0 6px; }
  p{ color:var(--soft); margin:0 0 34px; }
  nav{ display:flex; gap:18px; justify-content:center; font-size:15px; }
  a{ color:var(--ink); text-underline-offset:3px; }
</style>
</head>
<body>
<main>
  <h1>crawl</h1>
  <p>your app, built live</p>
  <nav>
    <a href="./privacy">Privacy Policy</a>
    <a href="./terms">Terms of Use</a>
  </nav>
</main>
</body>
</html>
